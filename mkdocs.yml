site_name: PowerShell Server Docs
site_description: Nightly-generated Active Directory server inventory published with Material for MkDocs
site_url: https://example.com/
repo_name: powershell_server_docs
repo_url: https://github.com/justinbrant/powershell_server_docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: blue

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Servers:
      - Overview: servers/index.md
      - Sample: servers/SAMPLE-SRV01.md
